name: Ternny Performance Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select manual test to run'
        required: true
        type: choice
        options:
          - stress
          - spike
          - all

jobs:

  # AUTOMATIC TESTS (run on every push) 

  k6-smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 Smoke Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: Scripts/SmokeTesting.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload k6 Smoke Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-smoke-report
          path: Reports/smoke.html

  k6-load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest
    needs: k6-smoke-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: Scripts/LoadTesting.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload k6 Load Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-report
          path: Reports/load.html

  jmeter-smoke-test:
    name: JMeter Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Install JMeter Plugins
        run: |
          wget https://repo1.maven.org/maven2/kg/apc/cmdrunner/2.3/cmdrunner-2.3.jar \
            -P apache-jmeter-5.6.3/lib/
          wget https://repo1.maven.org/maven2/kg/apc/jmeter-plugins-manager/1.10/jmeter-plugins-manager-1.10.jar \
            -P apache-jmeter-5.6.3/lib/ext/
          java -cp apache-jmeter-5.6.3/lib/ext/jmeter-plugins-manager-1.10.jar \
            org.jmeterplugins.repository.PluginManagerCMDInstaller
          apache-jmeter-5.6.3/bin/PluginsManagerCMD.sh install \
            bzm-concurrency-thread-group,jpgc-casutg

      - name: Create Results and Reports Folders
        run: |
          mkdir -p JMeter/Results/Smoke
          mkdir -p JMeter/Reports/Smoke

      - name: Run JMeter Smoke Test
        run: |
          apache-jmeter-5.6.3/bin/jmeter.sh -n \
            -t JMeter/Ternny_Performance_test.jmx \
            -l JMeter/Results/Smoke/smoke.jtl \
            -e -o JMeter/Reports/Smoke

      - name: Upload JMeter Smoke Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-smoke-report
          path: JMeter/Reports/Smoke

  jmeter-load-test:
    name: JMeter Load Test
    runs-on: ubuntu-latest
    needs: jmeter-smoke-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Install JMeter Plugins
        run: |
          wget https://repo1.maven.org/maven2/kg/apc/cmdrunner/2.3/cmdrunner-2.3.jar \
            -P apache-jmeter-5.6.3/lib/
          wget https://repo1.maven.org/maven2/kg/apc/jmeter-plugins-manager/1.10/jmeter-plugins-manager-1.10.jar \
            -P apache-jmeter-5.6.3/lib/ext/
          java -cp apache-jmeter-5.6.3/lib/ext/jmeter-plugins-manager-1.10.jar \
            org.jmeterplugins.repository.PluginManagerCMDInstaller
          apache-jmeter-5.6.3/bin/PluginsManagerCMD.sh install \
            bzm-concurrency-thread-group,jpgc-casutg

      - name: Create Results and Reports Folders
        run: |
          mkdir -p JMeter/Results/Load
          mkdir -p JMeter/Reports/Load

      - name: Run JMeter Load Test
        run: |
          apache-jmeter-5.6.3/bin/jmeter.sh -n \
            -t JMeter/Ternny_Performance_test.jmx \
            -l JMeter/Results/Load/load.jtl \
            -e -o JMeter/Reports/Load

      - name: Upload JMeter Load Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-load-report
          path: JMeter/Reports/Load

  # MANUAL TESTS (run only when triggered manually) 

  k6-stress-test:
    name: k6 Stress Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.test_type == 'stress' || inputs.test_type == 'all')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 Stress Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: Scripts/StressTesting.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload k6 Stress Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-stress-report
          path: Reports/stress.html

  k6-spike-test:
    name: k6 Spike Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.test_type == 'spike' || inputs.test_type == 'all')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6 Spike Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: Scripts/SpikeTesting.js
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload k6 Spike Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-spike-report
          path: Reports/spike.html

  jmeter-stress-test:
    name: JMeter Stress Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.test_type == 'stress' || inputs.test_type == 'all')
