  jmeter-spike-test:
    name: JMeter Spike Test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.test_type == 'spike' || inputs.test_type == 'all')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
