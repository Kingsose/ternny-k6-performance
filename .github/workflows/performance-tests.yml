          java -cp apache-jmeter-5.6.3/lib/ext/jmeter-plugins-manager-1.10.jar \
            org.jmeterplugins.repository.PluginManagerCMDInstaller
          apache-jmeter-5.6.3/bin/PluginsManagerCMD.sh install \
